<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>LexFlow — Camada de Execução sobre o ControlJus</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F6F3EC; --paper-2:#EFEBE0; --ink:#16233A; --ink-2:#2A3B54; --ink-soft:#5A6B85;
  --line:#DDD6C4; --selo:#7C2333; --vermelho:#B23A2E; --laranja:#C97A2B; --amarelo:#B8941F;
  --verde:#3F7D52; --cinza:#8B8F94; --azul:#2E5C8A; --white:#FFFDF9;
  --shadow: 0 1px 2px rgba(22,35,58,0.06), 0 4px 16px rgba(22,35,58,0.06);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'IBM Plex Sans', sans-serif; background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased;}
.mono{font-family:'IBM Plex Mono', monospace;} .serif{font-family:'Source Serif 4', serif;}
#app{display:flex; min-height:100vh;}

.sidebar{width:238px; flex-shrink:0; background:var(--ink); color:var(--paper); display:flex; flex-direction:column; padding:24px 16px; position:sticky; top:0; height:100vh; overflow-y:auto;}
.brand{display:flex; align-items:center; gap:10px; padding:0 8px 14px 8px; border-bottom:1px solid rgba(255,255,255,0.12); margin-bottom:8px;}
.seal{width:34px; height:34px; border-radius:50%; border:2px solid var(--selo); display:flex; align-items:center; justify-content:center; color:#E8C9C9; font-family:'Source Serif 4',serif; font-weight:700; font-size:15px; flex-shrink:0;}
.brand-text{line-height:1.15;}
.brand-text .t1{font-family:'Source Serif 4', serif; font-size:15.5px; font-weight:600; color:#F6F3EC;}
.brand-text .t2{font-size:10px; letter-spacing:.04em; color:#8FA0BC; text-transform:uppercase;}
.tagline{font-size:10.5px; color:#7C8CA8; line-height:1.5; padding:10px 8px 16px 8px; border-bottom:1px solid rgba(255,255,255,0.12); margin-bottom:8px;}
.tagline b{color:#C9A8AC;}

.nav{display:flex; flex-direction:column; gap:2px; flex:1;}
.nav-label{font-size:9.5px; text-transform:uppercase; letter-spacing:.06em; color:#5F7093; padding:12px 12px 4px 12px;}
.nav button{all:unset; cursor:pointer; display:flex; align-items:center; gap:11px; padding:9px 12px; border-radius:8px; font-size:13px; color:#B7C2D6; font-weight:500; transition:background .15s, color .15s;}
.nav button:hover{background:rgba(255,255,255,0.06); color:#F6F3EC;}
.nav button.active{background:var(--selo); color:#fff;}
.nav button .ic{width:16px; text-align:center; opacity:.9;}
.nav .badge{margin-left:auto; background:rgba(255,255,255,0.14); color:#fff; font-size:10px; font-family:'IBM Plex Mono',monospace; padding:1px 6px; border-radius:20px;}
.nav button.active .badge{background:rgba(255,255,255,0.28);}
.nav .badge.crit{background:var(--vermelho); color:#fff;}
.sidebar-foot{border-top:1px solid rgba(255,255,255,0.12); padding-top:12px; font-size:10px; color:#6C7C99; margin-top:8px;}

.main{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{padding:22px 36px 18px 36px; display:flex; align-items:flex-end; justify-content:space-between; border-bottom:1px solid var(--line); background:var(--white);}
.topbar h1{font-family:'Source Serif 4', serif; font-size:22px; font-weight:600;}
.topbar .sub{font-size:12.5px; color:var(--ink-soft); margin-top:4px;}
.topbar-actions{display:flex; gap:8px;}
.content{padding:28px 36px 60px 36px; flex:1;}

.btn{font-family:'IBM Plex Sans', sans-serif; font-size:12.5px; font-weight:600; padding:8px 14px; border-radius:7px; border:1px solid var(--line); background:var(--white); color:var(--ink); cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:all .12s;}
.btn:hover{border-color:var(--ink-soft); background:var(--paper-2);}
.btn.primary{background:var(--selo); border-color:var(--selo); color:#fff;}
.btn.primary:hover{background:#661C29;}
.btn.azul{background:var(--azul); border-color:var(--azul); color:#fff;}
.btn.azul:hover{background:#234A70;}
.btn.ghost{border-color:transparent; background:transparent;}
.btn.small{padding:5px 10px; font-size:11.5px;}
.btn.danger{color:var(--vermelho);}

.grid-cards{display:grid; grid-template-columns:repeat(auto-fit, minmax(155px,1fr)); gap:12px; margin-bottom:26px;}
.card{background:var(--white); border:1px solid var(--line); border-radius:10px; padding:16px 16px 14px 16px; box-shadow:var(--shadow); cursor:pointer; transition:transform .12s;}
.card:hover{transform:translateY(-2px);}
.card .num{font-family:'Source Serif 4', serif; font-size:28px; font-weight:600; line-height:1;}
.card .lbl{font-size:11px; color:var(--ink-soft); margin-top:6px; font-weight:500;}
.card.c-vermelho .num{color:var(--vermelho);} .card.c-laranja .num{color:var(--laranja);}
.card.c-amarelo .num{color:var(--amarelo);} .card.c-verde .num{color:var(--verde);}
.card.c-ink .num{color:var(--ink);} .card.c-azul .num{color:var(--azul);}

.section-title{font-family:'Source Serif 4', serif; font-size:16px; font-weight:600; margin:26px 0 12px 0; display:flex; align-items:center; gap:8px;}
.section-title .cnt{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); background:var(--paper-2); padding:2px 8px; border-radius:20px;}

.selo-ring{position:relative; width:44px; height:44px; flex-shrink:0;}
.selo-ring svg{transform:rotate(-90deg);}
.selo-ring .bg{fill:none; stroke:var(--line); stroke-width:4;}
.selo-ring .fg{fill:none; stroke-width:4; stroke-linecap:round; transition:stroke-dashoffset .3s;}
.selo-ring .num{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:13px;}
.ring-vermelho .fg{stroke:var(--vermelho);} .ring-vermelho .num{color:var(--vermelho);}
.ring-laranja .fg{stroke:var(--laranja);} .ring-laranja .num{color:var(--laranja);}
.ring-amarelo .fg{stroke:var(--amarelo);} .ring-amarelo .num{color:var(--amarelo);}
.ring-verde .fg{stroke:var(--verde);} .ring-verde .num{color:var(--verde);}
.ring-cinza .fg{stroke:var(--cinza);} .ring-cinza .num{color:var(--cinza);}

.plist{display:flex; flex-direction:column; gap:8px;}
.prow{background:var(--white); border:1px solid var(--line); border-left:4px solid var(--cinza); border-radius:8px; padding:11px 14px; display:flex; align-items:center; gap:14px; box-shadow:var(--shadow);}
.prow.b-vermelho{border-left-color:var(--vermelho);} .prow.b-laranja{border-left-color:var(--laranja);}
.prow.b-amarelo{border-left-color:var(--amarelo);} .prow.b-verde{border-left-color:var(--verde);}
.prow.b-cinza{border-left-color:var(--cinza); opacity:.7;} .prow.b-azul{border-left-color:var(--azul);}
.prow .info{flex:1; min-width:0;}
.prow .top-line{display:flex; gap:8px; align-items:baseline; flex-wrap:wrap;}
.prow .cliente{font-weight:600; font-size:13.5px;}
.prow .proc{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft);}
.prow .desc{font-size:12px; color:var(--ink-soft); margin-top:2px;}
.tribunal-tag{font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:600; color:var(--ink-2); background:var(--paper-2); border:1px solid var(--line); padding:1px 6px; border-radius:4px;}
.empty{padding:30px; text-align:center; color:var(--ink-soft); font-size:13px; background:var(--white); border:1px dashed var(--line); border-radius:10px;}

.filters{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; align-items:center;}
.filters select, .filters input[type=text]{font-family:'IBM Plex Sans'; font-size:12.5px; padding:7px 10px; border-radius:7px; border:1px solid var(--line); background:var(--white); color:var(--ink);}
.filters input[type=text]{min-width:190px;}
.chk{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-soft); cursor:pointer; padding:7px 4px;}
.table-wrap{background:var(--white); border:1px solid var(--line); border-radius:10px; overflow:auto; box-shadow:var(--shadow);}
table{width:100%; border-collapse:collapse; font-size:12.5px; min-width:900px;}
thead th{text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); padding:10px 12px; border-bottom:1px solid var(--line); background:var(--paper-2); white-space:nowrap; cursor:pointer; position:sticky; top:0;}
thead th:hover{color:var(--ink);}
tbody td{padding:10px 12px; border-bottom:1px solid var(--line); vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:#FBFAF6;}
tbody tr.archived{opacity:.55;}
td.proc{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--ink-2);}
td.cliente{font-weight:600;}
td.texto{max-width:320px; font-size:11.5px; color:var(--ink-soft);}
.pub-table{table-layout:fixed; min-width:1280px;}
.pub-table th:nth-child(1){width:92px;}
.pub-table th:nth-child(2){width:210px;}
.pub-table th:nth-child(3){width:150px;}
.pub-table th:nth-child(4){width:84px;}
.pub-table th:nth-child(5){width:120px;}
.pub-table th:nth-child(6){width:330px;}
.pub-table th:nth-child(7){width:150px;}
.pub-table th:nth-child(8){width:145px;}
.pub-table th:nth-child(9){width:105px;}
.pub-table th:nth-child(10){width:92px;}
.recorte-preview{display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; line-height:1.35;}
.recorte-meta{display:block; margin-top:4px; font-size:10.5px; color:var(--azul); font-weight:600;}
.row-actions{display:flex; gap:4px;}
a.link-audi{color:var(--selo); text-decoration:none; font-size:11.5px; font-weight:600;}
a.link-audi:hover{text-decoration:underline;}

.pill{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; white-space:nowrap;}
.pill .dot{width:6px; height:6px; border-radius:50%;}
.pill.st-vermelho{background:#F5E2E0; color:var(--vermelho);} .pill.st-vermelho .dot{background:var(--vermelho);}
.pill.st-laranja{background:#F6E8DA; color:var(--laranja);} .pill.st-laranja .dot{background:var(--laranja);}
.pill.st-amarelo{background:#F3EDD6; color:var(--amarelo);} .pill.st-amarelo .dot{background:var(--amarelo);}
.pill.st-verde{background:#E1EEE4; color:var(--verde);} .pill.st-verde .dot{background:var(--verde);}
.pill.st-cinza{background:#E9E9E7; color:var(--cinza);} .pill.st-cinza .dot{background:var(--cinza);}
.pill.st-ink{background:#E4E9F0; color:var(--ink-2);} .pill.st-ink .dot{background:var(--ink-2);}
.pill.st-azul{background:#E1EAF2; color:var(--azul);} .pill.st-azul .dot{background:var(--azul);}

select.status-select{font-family:'IBM Plex Sans'; font-size:11.5px; font-weight:600; padding:4px 8px; border-radius:20px; border:1px solid var(--line); background:var(--paper-2); color:var(--ink);}
.priority-tag{font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.03em;}
.priority-alta{color:var(--vermelho);} .priority-media{color:var(--laranja);} .priority-baixa{color:var(--ink-soft);}

.overlay{position:fixed; inset:0; background:rgba(22,35,58,0.45); display:none; align-items:center; justify-content:center; z-index:100; padding:20px;}
.overlay.open{display:flex;}
.modal{background:var(--white); border-radius:12px; width:100%; max-width:580px; max-height:88vh; overflow:auto; box-shadow:0 20px 60px rgba(0,0,0,0.25); border:1px solid var(--line);}
.modal-head{padding:18px 22px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center;}
.modal-head h3{font-family:'Source Serif 4',serif; font-size:17px; font-weight:600;}
.modal-body{padding:20px 22px; display:flex; flex-direction:column; gap:13px;}
.modal-foot{padding:16px 22px; border-top:1px solid var(--line); display:flex; justify-content:flex-end; gap:8px;}
.field{display:flex; flex-direction:column; gap:5px;}
.field label{font-size:11.5px; font-weight:600; color:var(--ink-2);}
.field input, .field select, .field textarea{font-family:'IBM Plex Sans'; font-size:13px; padding:8px 10px; border-radius:7px; border:1px solid var(--line); background:var(--paper); color:var(--ink);}
.field textarea{resize:vertical; min-height:60px;}
.field-row{display:flex; gap:10px;}
.field-row .field{flex:1;}
.close-x{all:unset; cursor:pointer; font-size:18px; color:var(--ink-soft); padding:4px;}

.alert-group{margin-bottom:22px;}
.alert-head{display:flex; align-items:center; gap:8px; margin-bottom:10px;}
.alert-head .swatch{width:10px; height:10px; border-radius:3px;}
.alert-head h4{font-size:13.5px; font-weight:700;}

.toast{position:fixed; bottom:22px; right:22px; background:var(--ink); color:#fff; padding:11px 18px; border-radius:8px; font-size:12.5px; box-shadow:var(--shadow); z-index:200; opacity:0; transform:translateY(8px); transition:all .25s; pointer-events:none;}
.toast.show{opacity:1; transform:translateY(0);}

.hist-item{display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--line); font-size:12px;}
.hist-item:last-child{border-bottom:none;}
.hist-item .t{color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; font-size:10.5px; white-space:nowrap;}

/* Integração / roadmap tab */
.roadmap-hero{background:var(--ink); color:var(--paper); border-radius:12px; padding:26px 28px; margin-bottom:24px;}
.roadmap-hero .eyebrow{font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:#9AAAC6; margin-bottom:8px;}
.roadmap-hero .frase{font-family:'Source Serif 4', serif; font-size:19px; line-height:1.45; max-width:640px;}
.roadmap-hero .frase b{color:#E8C9C9;}
.steps{display:flex; flex-direction:column; gap:0; margin-bottom:28px;}
.step{display:flex; gap:16px; padding:18px 0; border-bottom:1px solid var(--line);}
.step:last-child{border-bottom:none;}
.step-num{width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Source Serif 4',serif; font-weight:700; font-size:14px; flex-shrink:0;}
.step.done .step-num{background:var(--verde); color:#fff;}
.step.wip .step-num{background:var(--laranja); color:#fff;}
.step.todo .step-num{background:var(--paper-2); color:var(--ink-soft); border:1px solid var(--line);}
.step h4{font-size:14.5px; font-weight:700; margin-bottom:3px;}
.step .tag{font-size:10px; text-transform:uppercase; letter-spacing:.04em; font-weight:700; padding:2px 8px; border-radius:20px; margin-left:8px;}
.step.done .tag{background:#E1EEE4; color:var(--verde);}
.step.wip .tag{background:#F6E8DA; color:var(--laranja);}
.step.todo .tag{background:var(--paper-2); color:var(--ink-soft);}
.step p{font-size:12.5px; color:var(--ink-soft); line-height:1.5; max-width:640px;}
.path-cards{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:28px;}
.path-card{background:var(--white); border:1px solid var(--line); border-radius:10px; padding:18px 20px; box-shadow:var(--shadow);}
.path-card .path-tag{font-size:10px; text-transform:uppercase; font-weight:700; letter-spacing:.05em; color:var(--selo);}
.path-card h4{font-family:'Source Serif 4',serif; font-size:15.5px; margin:6px 0 8px 0;}
.path-card p{font-size:12.5px; color:var(--ink-soft); line-height:1.55;}
.checklist{display:flex; flex-direction:column; gap:2px;}
.check-item{display:flex; align-items:center; gap:10px; padding:10px 4px; border-bottom:1px solid var(--line); font-size:13px;}
.check-item:last-child{border-bottom:none;}
.check-item input{width:16px; height:16px; accent-color:var(--verde);}
.check-item.checked span{text-decoration:line-through; color:var(--ink-soft);}
@media (max-width: 860px){ .path-cards{grid-template-columns:1fr;} }

@media (max-width: 860px){
  .sidebar{position:fixed; left:0; top:0; z-index:90; transform:translateX(-100%); transition:transform .2s; box-shadow:0 0 30px rgba(0,0,0,0.3);}
  .sidebar.open{transform:translateX(0);}
  .content{padding:20px 16px 60px 16px;}
  .topbar{padding:16px;}
  .menu-btn{display:flex !important;}
}
.menu-btn{display:none; align-items:center; justify-content:center; width:34px; height:34px; border-radius:8px; border:1px solid var(--line); background:var(--white); cursor:pointer; margin-right:10px;}
</style>
</head>
<body>
<div id="app">
  <div class="sidebar" id="sidebar">
    <div class="brand">
      <div class="seal">§</div>
      <div class="brand-text"><div class="t1">LexFlow</div><div class="t2">Prazos, Audiências & Publicações</div></div>
    </div>
    <div class="tagline">O <b>ControlJus</b> informa. O <b>LexFlow</b> cobra, organiza e evita perda de prazo.</div>
    <div class="nav" id="nav"></div>
    <div class="sidebar-foot">Painel de comando jurídico<br>MVP · dados locais deste navegador</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div style="display:flex; align-items:center;">
        <button class="menu-btn" id="menuBtn">☰</button>
        <div><h1 id="pageTitle">Dashboard</h1><div class="sub" id="pageSub"></div></div>
      </div>
      <div class="topbar-actions">
        <button class="btn" id="importBtn">Sincronizar ControlJus</button>
        <button class="btn" id="exportBtn">⇩ Exportar CSV</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modalBox"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ===================== HELPERS ===================== */
const uid = () => Math.random().toString(36).slice(2,10);
const MONTHS = {'janeiro':0,'fevereiro':1,'março':2,'abril':3,'maio':4,'junho':5,'julho':6,'agosto':7,'setembro':8,'outubro':9,'novembro':10,'dezembro':11};
function parsePtDate(str){
  if(!str) return null;
  const m = str.toLowerCase().match(/(\d{1,2})\s+de\s+([a-zç]+)\s+de\s+(\d{4})/);
  if(!m) return null;
  const monthIdx = MONTHS[m[2]];
  if(monthIdx === undefined) return null;
  return new Date(parseInt(m[3]), monthIdx, parseInt(m[1]));
}
function parseDateLocal(value){
  if(!value) return null;
  if(value instanceof Date) return new Date(value.getFullYear(), value.getMonth(), value.getDate());
  const str = String(value);
  const iso = str.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(iso) return new Date(Number(iso[1]), Number(iso[2])-1, Number(iso[3]));
  const dt = new Date(str);
  if(isNaN(dt)) return null;
  return dt;
}
function fmtDate(d){
  if(!d) return '—';
  const iso = String(d).match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(iso) return `${iso[3]}/${iso[2]}/${iso[1]}`;
  const dt=parseDateLocal(d);
  if(!dt) return '—';
  const dd=String(dt.getDate()).padStart(2,'0');
  const mm=String(dt.getMonth()+1).padStart(2,'0');
  return `${dd}/${mm}/${dt.getFullYear()}`;
}
function fmtDateTime(d){ if(!d) return '—'; const dt=new Date(d); if(isNaN(dt)) return '—'; return dt.toLocaleString('pt-BR'); }
function isoOf(d){ const dt=parseDateLocal(d); if(!dt) return ''; const mm=String(dt.getMonth()+1).padStart(2,'0'); const dd=String(dt.getDate()).padStart(2,'0'); return `${dt.getFullYear()}-${mm}-${dd}`; }
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
function diasRestantes(dateVal){
  const dt = parseDateLocal(dateVal);
  if(!dt) return null;
  const d = new Date(dt); d.setHours(0,0,0,0);
  return Math.round((d - TODAY) / 86400000);
}
function riskColor(dias, done){
  if(done) return 'cinza';
  if(dias === null) return 'cinza';
  if(dias <= 0) return 'vermelho';
  if(dias <= 3) return 'laranja';
  if(dias <= 7) return 'amarelo';
  return 'verde';
}

const PRAZO_STATUSES = ['Novo','Em análise','Em elaboração','Aguardando revisão','Protocolar','Concluído','Vencido','Arquivado'];
const PRAZO_DONE = ['Concluído','Arquivado'];
const PRAZO_ARCHIVED = ['Arquivado'];
const AUDI_STATUSES = ['Agendada','Preparar documentos','Confirmar cliente','Confirmar link','Realizada','Remarcada','Cancelada','Arquivado'];
const AUDI_DONE = ['Realizada','Cancelada','Arquivado'];
const AUDI_ARCHIVED = ['Arquivado'];
const TAREFA_STATUSES = ['Aberta','Em andamento','Aguardando terceiro','Concluída','Atrasada','Arquivado'];
const TAREFA_DONE = ['Concluída','Arquivado'];
const TAREFA_ARCHIVED = ['Arquivado'];

async function loadDB(){
  try{
    const res = await window.storage.get('lc:data', false);
    if(res && res.value){
      DB = JSON.parse(res.value);
      if(DB.dataVersion !== APP_DATA_VERSION){
        DB = seedData();
        DB.historico.unshift({ts:new Date().toISOString(), texto:'Base operacional recriada a partir da fonte oficial do LexFlow. Dados manuais antigos ficaram fora da operação e servem apenas para de-para/validação.'});
        ensureFixedConfig();
        applyKnownCorrections();
        await saveDB();
        return;
      }
      if(!DB.publicacoes) DB.publicacoes=[];
      DB.dataVersion = APP_DATA_VERSION;
      const changed = ensureFixedConfig() || applyDataMigrations() || applyKnownCorrections();
      if(changed) await saveDB();
      return;
    }
  }catch(e){}
  DB = seedData();
  DB.dataVersion = APP_DATA_VERSION;
  ensureFixedConfig();
  applyDataMigrations();
  applyKnownCorrections();
  await saveDB();
}
async function saveDB(){ try{ await window.storage.set('lc:data', JSON.stringify(DB), false); }catch(e){ console.error('storage error', e); } }

let toastTimer;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2600); }
function cleanText(v){ return String(v??'').replace(/\u0000/g,' ').replace(/\s+/g,' ').trim(); }
function esc(v){ return cleanText(v).replace(/[&<>"']/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function recortePreview(text){
  const cleaned = cleanText(text);
  if(!cleaned) return '—';
  return cleaned.length > 360 ? cleaned.slice(0,360).trim() + '...' : cleaned;
}

function syncErrorMessage(payload){
  const msg = payload?.sync?.message || payload?.error || payload?.lastError?.message || 'Falha ao sincronizar ControlJus';
  if(/CONTROLJUS_USER|CONTROLJUS_PASSWORD|credenciais/i.test(msg)){
    return 'Credenciais pendentes: configure CONTROLJUS_USER e CONTROLJUS_PASSWORD nos secrets da Cloudflare.';
  }
  return msg;
}

  if(p.refId) return `ref:${p.refId}`;
  const processo = String(p.processo||'').replace(/\D/g,'');
  const texto = String(p.textoRecorte||'').replace(/\s+/g,' ').trim().slice(0,120);
  return `fallback:${processo}:${p.dataPublicacao||''}:${texto}`;
}

function normalizeControlJusPublicacao(p){

async function syncControlJusPublicacoes(force = true, opts = {}){
  ensureFixedConfig();
  const silent = Boolean(opts.silent);
  const preserveView = Boolean(opts.preserveView);
  if(!silent) toast('Sincronizando ControlJus...');
  const url = new URL(DB.config.controlJusEndpoint);
  if(force) url.searchParams.set('refresh', '1');
  const res = await fetch(url.toString(), {headers:{'Accept':'application/json'}});
  const payload = await res.json().catch(()=>({}));
  if(!res.ok && res.status !== 202){
    const msg = syncErrorMessage(payload);
    DB.config.lastControlJusSyncAt = new Date().toISOString();
    DB.config.lastControlJusSyncStatus = /credenciais/i.test(msg) ? 'credenciais_pendentes' : 'erro';
    DB.config.lastControlJusSyncError = msg;
    logHist(`Sincronização ControlJus falhou: ${msg}`);
    await saveDB();
    throw new Error(msg);
  }

  const incoming = Array.isArray(payload.publicacoes) ? payload.publicacoes.map(normalizeControlJusPublicacao) : [];
  const byKey = new Map(DB.publicacoes.map(p=>[controlJusPublicacaoKey(p), p]));
  let created = 0;
  let updated = 0;

  incoming.forEach(pub=>{
    const key = controlJusPublicacaoKey(pub);
    const existing = byKey.get(key);
    if(!existing){
      DB.publicacoes.push(pub);
      byKey.set(key, pub);
      created++;
      return;
    }

    ['dataPublicacao','processo','cliente','tribunal','tipoPublicacao','textoRecorte','prazoIdentificado','prazoFatal','observacoes','linkOrigem','controlJusId'].forEach(field=>{
      if(pub[field] && existing[field] !== pub[field]){
        existing[field] = pub[field];
        updated++;
      }
    });
  });

  DB.config.lastControlJusSyncAt = payload.collectedAt || new Date().toISOString();
  DB.config.lastControlJusSyncStatus = payload.sync?.status || (res.status === 202 ? 'processing' : 'fresh');
  DB.config.lastControlJusSyncCount = incoming.length;
  DB.config.lastControlJusSyncError = '';
  logHist(`Sincronização ControlJus concluída: ${created} novos recortes, ${updated} campos atualizados, ${incoming.length} recebidos.`);
  await saveDB();
  if(!preserveView){
    currentView = 'publicacoes';
    dashboardFilter = null;
    renderAll();
  }
  if(!silent) toast(created ? `${created} novos recortes importados` : 'ControlJus sincronizado');
  return {created, updated, total:incoming.length, status:DB.config.lastControlJusSyncStatus};
}

  }

  const byKey = new Map(DB.publicacoes.map(p=>[controlJusPublicacaoKey(p), p]));
  let created = 0;
  let updated = 0;

  incoming.forEach(pub=>{
    const key = controlJusPublicacaoKey(pub);

    if(!existing){
      DB.publicacoes.push(pub);
      byKey.set(key, pub);
      created++;
      return;
    }
    ['dataPublicacao','processo','cliente','tribunal','tipoPublicacao','textoRecorte','prazoIdentificado','observacoes','linkOrigem'].forEach(field=>{
      if(pub[field] && existing[field] !== pub[field]){
        existing[field] = pub[field];
        updated++;
      }
    });
  });

  DB.config.lastDjenSyncAt = payload.collectedAt || new Date().toISOString();
  DB.config.lastDjenSyncStatus = payload.sync?.status || (res.status === 202 ? 'processing' : 'fresh_djen');
  DB.config.lastDjenSyncCount = incoming.length;
  DB.config.lastDjenSyncError = payload.diagnostics?.errors?.length ? payload.diagnostics.errors.join(' | ') : '';
  logHist(`Sincronização DJEN/CNJ concluída: ${created} novas comunicações, ${updated} campos atualizados, ${incoming.length} recebidas.`);
  await saveDB();
  if(!preserveView){
    currentView = 'publicacoes';
    dashboardFilter = null;
    renderAll();
  }
  if(!silent) toast(created ? `${created} comunicações DJEN importadas` : 'DJEN/CNJ sincronizado');

}

async function hydrateFromServerCache(){
  ensureFixedConfig();
  const results = await Promise.allSettled([
    syncControlJusPublicacoes(false, {silent:true, preserveView:true}),
    syncDjenComunicacoes(false, {silent:true, preserveView:true})
  ]);
  const changed = results.some(result => result.status === 'fulfilled');
  if(changed) renderAll();
}

function computeAlertCount(){
  let crit = 0;
  DB.prazos.filter(isControlJusPrazo).forEach(p=>{ if(PRAZO_DONE.includes(p.status)) return; const dr=diasRestantes(p.prazoFatal); if(dr!==null && dr<=0) crit++; });
  DB.audiencias.forEach(a=>{ if(AUDI_DONE.includes(a.status)) return; const dr=diasRestantes(a.data); if(dr!==null && dr>=0 && dr<=1) crit++; });
  return crit;
}

function renderNav(){
  const nav = document.getElementById('nav');
  const critCount = computeAlertCount();
  let html = '';
  ['main','sec'].forEach((g,gi)=>{
    if(gi===1) html += `<div class="nav-label">Sistema</div>`;
    VIEWS.filter(v=>v.group===g).forEach(v=>{
      let badge='';
      if(v.id==='publicacoes'){ const n=DB.publicacoes.filter(p=>PUB_UNTREATED.includes(p.status)).length; if(n>0) badge=`<span class="badge crit">${n}</span>`; else badge=`<span class="badge">${DB.publicacoes.length}</span>`; }
      if(v.id==='prazos') badge = `<span class="badge">${DB.prazos.filter(p=>isControlJusPrazo(p) && !PRAZO_ARCHIVED.includes(p.status)).length}</span>`;
      if(v.id==='audiencias') badge = `<span class="badge">${DB.audiencias.filter(a=>!AUDI_ARCHIVED.includes(a.status)).length}</span>`;
      if(v.id==='tarefas') badge = `<span class="badge">${DB.tarefas.filter(t=>!TAREFA_DONE.includes(t.status)).length}</span>`;
      if(v.id==='alertas' && critCount>0) badge = `<span class="badge crit">${critCount}</span>`;
      html += `<button data-view="${v.id}" class="${v.id===currentView?'active':''}"><span class="ic">${v.icon}</span>${v.label}${badge}</button>`;
    });

  nav.innerHTML = html;

function ringHTML(dias, done){
  const color = riskColor(dias, done);
  const r = 18, C = 2*Math.PI*r;
  let pct;
  if(done) pct = 1; else if(dias===null) pct=0; else pct = Math.max(0, Math.min(1, 1 - (dias/14)));
  if(dias!==null && dias<0) pct = 1;
  const offset = C * (1-pct);
  const label = done ? '✓' : (dias===null ? '—' : (dias<0 ? 'V' : dias));
  return `<div class="selo-ring ring-${color}"><svg width="44" height="44"><circle class="bg" cx="22" cy="22" r="${r}"/><circle class="fg" cx="22" cy="22" r="${r}" stroke-dasharray="${C}" stroke-dashoffset="${offset}"/></svg><div class="num">${label}</div></div>`;
}
function pill(status, color){ return `<span class="pill st-${color}"><span class="dot"></span>${status}</span>`; }

function renderDashboard(){

  const activePubs = DB.publicacoes.filter(p=>!PUB_ARCHIVED.includes(p.status));

  const vencidos = activePrazos.filter(p=>!PRAZO_DONE.includes(p.status) && diasRestantes(p.prazoFatal)<0).length;
  const hoje = activePrazos.filter(p=>!PRAZO_DONE.includes(p.status) && diasRestantes(p.prazoFatal)===0).length;
  const em3 = activePrazos.filter(p=>{if(PRAZO_DONE.includes(p.status))return false; const d=diasRestantes(p.prazoFatal); return d>0&&d<=3;}).length;
  const em7 = activePrazos.filter(p=>{if(PRAZO_DONE.includes(p.status))return false; const d=diasRestantes(p.prazoFatal); return d>3&&d<=7;}).length;
  const pubSemTratamento = activePubs.filter(p=>PUB_UNTREATED.includes(p.status)).length;
  const tarefasSemResp = activeTarefas.filter(t=>!TAREFA_DONE.includes(t.status) && !t.responsavel).length;
  const audiProximas = activeAudi.filter(a=>{if(AUDI_DONE.includes(a.status))return false; const d=diasRestantes(a.data); return d>=0&&d<=7;}).length;
  const semRespTotal = activePrazos.filter(p=>!PRAZO_DONE.includes(p.status)&&!p.responsavel).length + activeAudi.filter(a=>!AUDI_DONE.includes(a.status)&&!a.responsavel).length;
  const itensCriticos = vencidos + activeAudi.filter(a=>!AUDI_DONE.includes(a.status)&&diasRestantes(a.data)===0).length + semRespTotal;

  const cards = [
    {n:vencidos, l:'Prazos vencidos', c:'vermelho', go:'prazos', filter:'prazos_vencidos'},
    {n:hoje, l:'Vencem hoje', c:'vermelho', go:'prazos', filter:'prazos_hoje'},
    {n:em3, l:'Próximos 3 dias', c:'laranja', go:'prazos', filter:'prazos_3'},
    {n:em7, l:'Próximos 7 dias', c:'amarelo', go:'prazos', filter:'prazos_7'},
    {n:pubSemTratamento, l:'Publicações sem tratamento', c:'azul', go:'publicacoes', filter:'pub_sem_tratamento'},
    {n:tarefasSemResp, l:'Tarefas sem responsável', c:'ink', go:'tarefas', filter:'tarefas_sem_resp'},
    {n:audiProximas, l:'Audiências próximas (7d)', c:'ink', go:'audiencias', filter:'audi_7'},
    {n:itensCriticos, l:'Itens críticos', c:'vermelho', go:'alertas', filter:'criticos'},
  ];

  let html = `<div class="grid-cards">${cards.map(c=>`<div class="card c-${c.c}" data-go="${c.go}" data-filter="${c.filter}"><div class="num">${c.n}</div><div class="lbl">${c.l}</div></div>`).join('')}</div>`;

  const items = [];
  activePrazos.filter(p=>!PRAZO_DONE.includes(p.status)).forEach(p=>{
    const dr = diasRestantes(p.prazoFatal);
    items.push({tipo:'Prazo', dr, cliente:p.cliente, processo:p.processo, tribunal:p.tribunal, desc:p.tipoPrazo, color:riskColor(dr,false), done:false});
  });
  activeAudi.filter(a=>!AUDI_DONE.includes(a.status)).forEach(a=>{
    const dr = diasRestantes(a.data);
    items.push({tipo:'Audiência', dr, cliente:a.cliente, processo:a.processo, tribunal:a.estado, desc:`${a.tipo} · ${a.horario}`, color:riskColor(dr,false), done:false, dataRaw:a.data});
  });
  items.sort((a,b)=> (a.dr??9999) - (b.dr??9999));
  const top = items.slice(0,10);

  html += `<div class="section-title">Fila de prioridade crítica <span class="cnt">${items.length} itens ativos</span></div>`;

  let rows = DB.publicacoes.slice();
  if(dashboardFilter==='pub_sem_tratamento') rows = rows.filter(p=>PUB_UNTREATED.includes(p.status));
  if(!pubFilters.showArchived) rows = rows.filter(p=>!PUB_ARCHIVED.includes(p.status));
  if(pubFilters.status) rows = rows.filter(p=>p.status===pubFilters.status);
  if(pubFilters.cliente) rows = rows.filter(p=>p.cliente.toLowerCase().includes(pubFilters.cliente.toLowerCase())||p.processo.toLowerCase().includes(pubFilters.cliente.toLowerCase()));
  rows.sort((a,b)=>{ let va=parseDateLocal(a[pubFilters.sort])||new Date(0), vb=parseDateLocal(b[pubFilters.sort])||new Date(0); if(va<vb) return -1*pubFilters.dir; if(va>vb) return 1*pubFilters.dir; return 0; });

/* ===================== PRAZOS ===================== */
let prazoFilters = {status:'', responsavel:'', cliente:'', showArchived:false, showValidation:false, sort:'prazoFatal', dir:1};

function renderPrazos(){
  const respSet = [...new Set(DB.prazos.map(p=>p.responsavel).filter(Boolean))];
  let rows = DB.prazos.slice();
  if(!prazoFilters.showValidation) rows = rows.filter(isControlJusPrazo);
  if(!prazoFilters.showArchived) rows = rows.filter(p=>!PRAZO_ARCHIVED.includes(p.status));
  if(dashboardFilter==='prazos_vencidos') rows = rows.filter(p=>!PRAZO_DONE.includes(p.status) && diasRestantes(p.prazoFatal)<0);
  if(dashboardFilter==='prazos_hoje') rows = rows.filter(p=>!PRAZO_DONE.includes(p.status) && diasRestantes(p.prazoFatal)===0);
  if(dashboardFilter==='prazos_3') rows = rows.filter(p=>{ if(PRAZO_DONE.includes(p.status)) return false; const d=diasRestantes(p.prazoFatal); return d>0 && d<=3; });
  if(dashboardFilter==='prazos_7') rows = rows.filter(p=>{ if(PRAZO_DONE.includes(p.status)) return false; const d=diasRestantes(p.prazoFatal); return d>3 && d<=7; });
  if(prazoFilters.status) rows = rows.filter(p=>p.status===prazoFilters.status);
  if(prazoFilters.responsavel) rows = rows.filter(p=>p.responsavel===prazoFilters.responsavel);
  if(prazoFilters.cliente) rows = rows.filter(p=>p.cliente.toLowerCase().includes(prazoFilters.cliente.toLowerCase()) || p.processo.toLowerCase().includes(prazoFilters.cliente.toLowerCase()));
  rows.sort((a,b)=>{ let va=a[prazoFilters.sort], vb=b[prazoFilters.sort]; if(prazoFilters.sort==='prazoFatal'||prazoFilters.sort==='dataPublicacao'){va=parseDateLocal(va)||new Date(0);vb=parseDateLocal(vb)||new Date(0);} if(va<vb) return -1*prazoFilters.dir; if(va>vb) return 1*prazoFilters.dir; return 0; });

  const filterLabels = {
    prazos_vencidos:'Prazos vencidos',
    prazos_hoje:'Prazos que vencem hoje',
    prazos_3:'Prazos dos próximos 3 dias',
    prazos_7:'Prazos dos próximos 7 dias'
  };
  const filterNote = filterLabels[dashboardFilter] ? `<div class="section-title">Filtro: ${filterLabels[dashboardFilter]} <span class="cnt">${rows.length}</span></div>` : '';
  let html = `${filterNote}<div class="filters">
    <input type="text" id="fCliente" placeholder="Buscar cliente ou processo..." value="${prazoFilters.cliente}">
    <select id="fStatus"><option value="">Todos os status</option>${PRAZO_STATUSES.map(s=>`<option ${prazoFilters.status===s?'selected':''}>${s}</option>`).join('')}</select>
    <select id="fResp"><option value="">Todos os responsáveis</option>${respSet.map(r=>`<option ${prazoFilters.responsavel===r?'selected':''}>${r}</option>`).join('')}</select>
    <label class="chk"><input type="checkbox" id="fValidation" ${prazoFilters.showValidation?'checked':''}> Mostrar validação/de-para</label>
    <label class="chk"><input type="checkbox" id="fArch" ${prazoFilters.showArchived?'checked':''}> Mostrar arquivados</label>
  </div>`;

  html += `<div class="table-wrap"><table><thead><tr>
    <th data-s="cliente">Cliente</th><th data-s="processo">Processo</th><th>Tribunal</th><th>Origem</th>
    <th data-s="dataPublicacao">Publicação</th><th>Tipo de prazo</th><th data-s="prazoFatal">Prazo fatal</th>
    <th>Restam</th><th>Responsável</th><th>Status</th><th>Prioridade</th><th></th>
  </tr></thead><tbody>`;
  if(rows.length===0){ html += `<tr><td colspan="12"><div class="empty">Nenhum prazo operacional encontrado. Dados manuais ficam ocultos por padrão e servem apenas para de-para/validação.</div></td></tr>`; }
  rows.forEach(p=>{
    const dr = diasRestantes(p.prazoFatal);
    const done = PRAZO_DONE.includes(p.status);
    const archived = PRAZO_ARCHIVED.includes(p.status);
    const color = riskColor(dr,done);
    html += `<tr data-id="${p.id}" class="${archived?'archived':''}">
      <td class="cliente">${p.cliente}</td>
      <td class="proc">${p.processo}</td>
      <td><span class="tribunal-tag">${p.tribunal}</span></td>
      <td>${p.origemPublicacaoId?`<span class="pill st-azul"><span class="dot"></span>ControlJus</span>`:'<span class="pill st-cinza"><span class="dot"></span>Validação</span>'}</td>
      <td>${fmtDate(p.dataPublicacao)}</td>
      <td>${p.tipoPrazo}</td>
      <td>${fmtDate(p.prazoFatal)}</td>
      <td>${pill(done?'Concluído':(dr<0?'Vencido':dr===0?'Hoje':dr+'d'), color)}</td>
      <td>${p.responsavel || '<span style="color:var(--vermelho); font-size:11px;">sem resp.</span>'}</td>
      <td><select class="status-select" data-act="status">${PRAZO_STATUSES.map(s=>`<option ${p.status===s?'selected':''}>${s}</option>`).join('')}</select></td>
      <td><span class="priority-tag priority-${p.prioridade==='Alta'?'alta':p.prioridade==='Baixa'?'baixa':'media'}">${p.prioridade}</span></td>
      <td class="row-actions">
        <button class="btn small ghost" data-act="edit">✎</button>
        ${!archived?`<button class="btn small ghost" data-act="archive" title="Arquivar (nunca excluir)">🗄</button>`:''}
      </td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  document.getElementById('content').innerHTML = html;

  document.getElementById('fCliente').oninput = e=>{prazoFilters.cliente=e.target.value; renderPrazos();};
  document.getElementById('fStatus').onchange = e=>{prazoFilters.status=e.target.value; renderPrazos();};
  document.getElementById('fResp').onchange = e=>{prazoFilters.responsavel=e.target.value; renderPrazos();};
  document.getElementById('fValidation').onchange = e=>{prazoFilters.showValidation=e.target.checked; renderPrazos();};
  document.getElementById('fArch').onchange = e=>{prazoFilters.showArchived=e.target.checked; renderPrazos();};
  document.querySelectorAll('th[data-s]').forEach(th=>th.onclick=()=>{ const s=th.dataset.s; if(prazoFilters.sort===s) prazoFilters.dir*=-1; else {prazoFilters.sort=s; prazoFilters.dir=1;} renderPrazos(); });
  document.querySelectorAll('tbody tr[data-id]').forEach(tr=>{
    const id = tr.dataset.id; const p = DB.prazos.find(x=>x.id===id);
    tr.querySelector('[data-act="status"]').onchange = async e=>{
      const old = p.status; p.status = e.target.value;
      if(p.status==='Concluído' && old!=='Concluído') p.concluidoEm = new Date().toISOString();
      logHist(`Prazo de ${p.cliente} (${p.processo}) alterado: ${old} → ${p.status}`);
      await saveDB(); renderAll(); toast('Status atualizado');
    };
    tr.querySelector('[data-act="edit"]').onclick = ()=>openPrazoModal(p);
    const archBtn = tr.querySelector('[data-act="archive"]');
    if(archBtn) archBtn.onclick = async ()=>{
      p.status='Arquivado'; logHist(`Prazo de ${p.cliente} (${p.processo}) arquivado (histórico preservado).`);
      await saveDB(); renderAll(); toast('Prazo arquivado — nada é excluído');
    };
  });
}

  rows.sort((a,b)=>{ let va=a[audiFilters.sort], vb=b[audiFilters.sort]; if(audiFilters.sort==='data'){va=new Date(a.data+'T'+(a.horario||'00:00')); vb=new Date(b.data+'T'+(b.horario||'00:00'));} if(va<vb) return -1*audiFilters.dir; if(va>vb) return 1*audiFilters.dir; return 0; });

  if(dashboardFilter==='tarefas_sem_resp') rows = rows.filter(t=>!TAREFA_DONE.includes(t.status) && !t.responsavel);
  if(!showArch) rows = rows.filter(t=>!TAREFA_ARCHIVED.includes(t.status));
  rows.sort((a,b)=> (parseDateLocal(a.dataLimite)||parseDateLocal('2999-01-01')) - (parseDateLocal(b.dataLimite)||parseDateLocal('2999-01-01')));
  const filterNote = dashboardFilter==='tarefas_sem_resp' ? `<div class="section-title">Filtro: Tarefas sem responsável <span class="cnt">${rows.length}</span></div>` : '';
  let html = `${filterNote}<div class="filters"><label class="chk" style="margin-left:auto;"><input type="checkbox" id="fArchT" ${showArch?'checked':''}> Mostrar arquivadas</label><button class="btn primary small" id="addTaskBtn">+ Nova tarefa</button></div>`;
  html += `<div class="table-wrap"><table><thead><tr><th>Título</th><th>Processo / Cliente</th><th>Responsável</th><th>Data limite</th><th>Prioridade</th><th>Status</th><th></th></tr></thead><tbody>`;
  if(rows.length===0){ html += `<tr><td colspan="7"><div class="empty">Nenhuma tarefa cadastrada. Crie tarefas vinculadas a prazos, audiências ou publicações.</div></td></tr>`; }
  rows.forEach(t=>{
    const dr = t.dataLimite ? diasRestantes(t.dataLimite) : null;
    const done = TAREFA_DONE.includes(t.status);
    const archived = TAREFA_ARCHIVED.includes(t.status);
    const color = riskColor(dr, done);
    html += `<tr data-id="${t.id}" class="${archived?'archived':''}">
      <td class="cliente">${t.titulo}</td>
      <td><div class="proc">${t.processo||'—'}</div><div style="font-size:11px; color:var(--ink-soft);">${t.cliente||''}</div></td>
      <td>${t.responsavel||'<span style="color:var(--vermelho); font-size:11px;">sem resp.</span>'}</td>
      <td>${t.dataLimite?fmtDate(t.dataLimite):'—'}</td>
      <td><span class="priority-tag priority-${t.prioridade==='Alta'?'alta':t.prioridade==='Baixa'?'baixa':'media'}">${t.prioridade}</span></td>
      <td><select class="status-select" data-act="status">${TAREFA_STATUSES.map(s=>`<option ${t.status===s?'selected':''}>${s}</option>`).join('')}</select></td>
      <td class="row-actions"><button class="btn small ghost" data-act="edit">✎</button>${!archived?`<button class="btn small ghost" data-act="archive" title="Arquivar (nunca excluir)">🗄</button>`:''}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  document.getElementById('content').innerHTML = html;
  document.getElementById('addTaskBtn').onclick = ()=>openTaskModal(null);
  const fArchT = document.getElementById('fArchT'); if(fArchT) fArchT.onchange = renderTarefas;
  document.querySelectorAll('tbody tr[data-id]').forEach(tr=>{
    const id=tr.dataset.id; const t = DB.tarefas.find(x=>x.id===id);
    tr.querySelector('[data-act="status"]').onchange = async e=>{
      const old=t.status; t.status = e.target.value;
      if(t.status==='Concluída' && old!=='Concluída') t.concluidoEm = new Date().toISOString();
      logHist(`Tarefa "${t.titulo}" alterada: ${old} → ${t.status}`);
      await saveDB(); renderAll(); toast('Status atualizado');
    };
    tr.querySelector('[data-act="edit"]').onclick = ()=>openTaskModal(t);
    const archBtn = tr.querySelector('[data-act="archive"]');
    if(archBtn) archBtn.onclick = async ()=>{ t.status='Arquivado'; logHist(`Tarefa "${t.titulo}" arquivada.`); await saveDB(); renderAll(); toast('Tarefa arquivada'); };
  });
}

function openTaskModal(t){
  const isNew = !t;
  const d = t || {id:uid(), titulo:'', processo:'', cliente:'', responsavel:'', dataLimite:'', status:'Aberta', prioridade:'Média', observacao:''};
  const box = document.getElementById('modalBox');
  box.innerHTML = `
    <div class="modal-head"><h3>${isNew?'Nova tarefa':'Editar tarefa'}</h3><button class="close-x" id="mClose">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Título da tarefa</label><input id="mTitulo" value="${d.titulo}" placeholder="Ex.: Protocolar contrarrazões"></div>
      <div class="field-row"><div class="field"><label>Processo vinculado</label><input id="mProcesso" class="mono" value="${d.processo}"></div><div class="field"><label>Cliente</label><input id="mCliente" value="${d.cliente}"></div></div>
      <div class="field-row"><div class="field"><label>Responsável</label><input id="mResp" value="${d.responsavel}"></div><div class="field"><label>Data limite</label><input type="date" id="mData" value="${d.dataLimite}"></div></div>
      <div class="field-row">
        <div class="field"><label>Prioridade</label><select id="mPrio"><option ${d.prioridade==='Alta'?'selected':''}>Alta</option><option ${d.prioridade==='Média'?'selected':''}>Média</option><option ${d.prioridade==='Baixa'?'selected':''}>Baixa</option></select></div>
        <div class="field"><label>Status</label><select id="mStatus">${TAREFA_STATUSES.map(s=>`<option ${d.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
      </div>
      <div class="field"><label>Observações</label><textarea id="mObs">${d.observacao}</textarea></div>
    </div>
    <div class="modal-foot"><button class="btn" id="mCancel">Cancelar</button><button class="btn primary" id="mSave">Salvar tarefa</button></div>
  `;
  showModal();
  document.getElementById('mClose').onclick = hideModal;
  document.getElementById('mCancel').onclick = hideModal;
  document.getElementById('mSave').onclick = async ()=>{
    const titulo = document.getElementById('mTitulo').value.trim();
    if(!titulo){ toast('Dê um título à tarefa'); return; }
    const updated = {
      ...d, titulo,
      processo:document.getElementById('mProcesso').value.trim(),
      cliente:document.getElementById('mCliente').value.trim(),
      responsavel:document.getElementById('mResp').value.trim(),
      dataLimite:document.getElementById('mData').value,
      prioridade:document.getElementById('mPrio').value,
      status:document.getElementById('mStatus').value,
      observacao:document.getElementById('mObs').value.trim(),
    };
    if(isNew){ DB.tarefas.push(updated); logHist(`Nova tarefa criada: "${titulo}"`); }
    else{ const idx=DB.tarefas.findIndex(x=>x.id===d.id); DB.tarefas[idx]=updated; logHist(`Tarefa "${titulo}" editada.`); }
    await saveDB(); hideModal(); renderAll(); toast('Tarefa salva');
  };
}

/* ===================== ALERTAS ===================== */
function renderAlertas(){
  const activePrazos = DB.prazos.filter(p=>isControlJusPrazo(p) && !PRAZO_DONE.includes(p.status));
  const activeAudi = DB.audiencias.filter(a=>!AUDI_DONE.includes(a.status));
  const activePubs = DB.publicacoes.filter(p=>!PUB_ARCHIVED.includes(p.status));

  const groups = [
    {label:'Prazos vencidos', color:'vermelho', items: activePrazos.filter(p=>diasRestantes(p.prazoFatal)<0), type:'prazo'},
    {label:'Prazos que vencem hoje', color:'vermelho', items: activePrazos.filter(p=>diasRestantes(p.prazoFatal)===0), type:'prazo'},
    {label:'Prazos próximos (até 7 dias)', color:'laranja', items: activePrazos.filter(p=>{const d=diasRestantes(p.prazoFatal); return d>0&&d<=7;}), type:'prazo'},
    {label:'Publicações sem análise', color:'azul', items: activePubs.filter(p=>PUB_UNTREATED.includes(p.status)), type:'pub'},
    {label:'Audiências de hoje', color:'vermelho', items: activeAudi.filter(a=>diasRestantes(a.data)===0), type:'audi'},
    {label:'Audiências amanhã', color:'laranja', items: activeAudi.filter(a=>diasRestantes(a.data)===1), type:'audi'},
    {label:'Itens sem responsável', color:'cinza', items: [...activePrazos.filter(p=>!p.responsavel), ...activeAudi.filter(a=>!a.responsavel)], type:'mixed'},
  ];
  const colorHex = {vermelho:'var(--vermelho)', laranja:'var(--laranja)', amarelo:'var(--amarelo)', verde:'var(--verde)', cinza:'var(--cinza)', azul:'var(--azul)'};
  let html = '';
  groups.forEach(g=>{
    html += `<div class="alert-group"><div class="alert-head"><span class="swatch" style="background:${colorHex[g.color]}"></span><h4>${g.label}</h4><span class="cnt" style="font-family:'IBM Plex Mono'; font-size:11px; color:var(--ink-soft); background:var(--paper-2); padding:2px 8px; border-radius:20px;">${g.items.length}</span></div>`;
    if(g.items.length===0){ html += `<div class="empty">Nenhum item nesta categoria.</div>`; }
    else{
      html += `<div class="plist">${g.items.map(it=>{
        const isAudi = it.hasOwnProperty('data') && it.hasOwnProperty('tipo') && it.hasOwnProperty('horario');
        const isPub = it.hasOwnProperty('textoRecorte');
        const dr = isAudi ? diasRestantes(it.data) : diasRestantes(it.prazoFatal||it.dataPublicacao);
        return `<div class="prow b-${g.color}">
          ${ringHTML(dr, false)}
          <div class="info">
            <div class="top-line"><span class="cliente">${esc(it.cliente)}</span><span class="tribunal-tag">${esc(isAudi?it.estado:it.tribunal)}</span></div>
            <div class="proc">${esc(it.processo)}</div>
            <div class="desc">${esc(isPub?recortePreview(it.textoRecorte):(isAudi?it.tipo:it.tipoPrazo))}</div>
          </div>
          <div style="text-align:right; font-size:11.5px; color:var(--ink-soft); white-space:nowrap;">${fmtDate(isAudi?it.data:(it.prazoFatal||it.dataPublicacao))}</div>
        </div>`;
      }).join('')}</div>`;
    }
    html += `</div>`;
  });
  document.getElementById('content').innerHTML = html;
}

/* ===================== HISTÓRICO ===================== */
function renderHistorico(){
  let html = `<div class="table-wrap" style="padding:8px 18px;">`;
  if(DB.historico.length===0){ html += `<div class="empty">Sem alterações registradas ainda.</div>`; }
  else{ html += DB.historico.map(h=>`<div class="hist-item"><span class="t">${new Date(h.ts).toLocaleString('pt-BR')}</span><span>${h.texto}</span></div>`).join(''); }
  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

function toCSV(rows, headers){
  const esc = v => `"${String(v??'').replace(/"/g,'""')}"`;
  const lines = [headers.map(esc).join(',')];
  rows.forEach(r=>lines.push(headers.map(h=>esc(r[h])).join(',')));
  return lines.join('\n');
}
document.getElementById('exportBtn').onclick = ()=>{
  let csv, filename;
  if(currentView==='audiencias'){ csv = toCSV(DB.audiencias, ['data','horario','cliente','processo','estado','tipo','modalidade','link','responsavel','status','observacoes']); filename='audiencias.csv'; }
  else if(currentView==='tarefas'){ csv = toCSV(DB.tarefas, ['titulo','processo','cliente','responsavel','dataLimite','prioridade','status','observacao','concluidoEm']); filename='tarefas.csv'; }
  else if(currentView==='publicacoes'){ csv = toCSV(DB.publicacoes, ['dataPublicacao','cliente','processo','tribunal','tipoPublicacao','textoRecorte','prazoIdentificado','status','responsavel','observacoes','linkOrigem']); filename='publicacoes.csv'; }
  else { csv = toCSV(DB.prazos, ['processo','cliente','tribunal','origemPublicacaoId','dataPublicacao','tipoPrazo','prazoFatal','responsavel','status','prioridade','observacao','concluidoEm']); filename='prazos.csv'; }
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
  toast('Exportado: '+filename);
};

const TITLES = {
  dashboard:['Dashboard Executivo', 'Visão geral de hoje, próximos 7 dias e itens de risco'],
  publicacoes:['Publicações / Recortes', 'Fonte: ControlJus — recortes que ainda não viraram prazo ou tarefa'],
  prazos:['Prazos', 'Controle de prazos processuais e pendências'],
  audiencias:['Audiências', 'Agenda de audiências por cliente, tribunal e modalidade'],
  tarefas:['Tarefas', 'Itens operacionais vinculados a processos, prazos e publicações'],
  alertas:['Central de Alertas', 'Tudo que exige atenção imediata, agrupado por urgência'],
  historico:['Histórico de alterações', 'Registro de tudo que foi criado, editado, concluído ou arquivado'],
  integracao:['Integração ControlJus', 'Roteiro para conectar de verdade o LexFlow ao ControlJus'],
};
function renderAll(){
  if(applyKnownCorrections()) saveDB();
  renderNav();
  const [title, sub] = TITLES[currentView];
  document.getElementById('pageTitle').textContent = title;
  document.getElementById('pageSub').textContent = sub;
  if(currentView==='dashboard') renderDashboard();
  else if(currentView==='publicacoes') renderPublicacoes();
  else if(currentView==='prazos') renderPrazos();
  else if(currentView==='audiencias') renderAudiencias();
  else if(currentView==='tarefas') renderTarefas();
  else if(currentView==='alertas') renderAlertas();
  else if(currentView==='historico') renderHistorico();
  else if(currentView==='integracao') renderIntegracao();
  document.getElementById('sidebar').classList.remove('open');
}
document.getElementById('menuBtn').onclick = ()=>document.getElementById('sidebar').classList.toggle('open');

/* ===================== INIT ===================== */
(async function init(){
  await loadDB();
  renderAll();
